<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>액체 시뮬레이션 프로토타입 v4</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Segoe UI", sans-serif;
}

body {
    width: 100vw;
    height: 100vh;
    display: flex;
    background: #111;
    color: #fff;
    overflow: hidden;
}

#canvas-container {
    flex: 1;
    position: relative;
    background: #111;
    overflow: hidden;
}

canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: crosshair;
    touch-action: none;
}

#control-panel {
    width: 50vw;
    min-width: 420px;
    max-width: 680px;
    height: 100vh;
    background: #222;
    border-left: 1px solid #333;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
    transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease;
}

#control-panel.collapsed {
    width: 0;
    min-width: 0;
    padding: 0;
    border-left: none;
    overflow: hidden;
}

#floating-toggle {
    position: absolute;
    top: 14px;
    right: 18px;
    z-index: 20;
    background: #007bff;
    border: none;
    color: #fff;
    padding: 9px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 800;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
}

h3 {
    font-size: 20px;
    margin-top: 34px;
}

.tabs {
    display: flex;
    gap: 8px;
}

.tab-btn {
    flex: 1;
    padding: 12px;
    background: #333;
    border: none;
    color: #aaa;
    cursor: pointer;
    border-radius: 8px;
    font-weight: 800;
}

.tab-btn.active {
    background: #007bff;
    color: #fff;
}

.info-text {
    color: #bbb;
    font-size: 13px;
    line-height: 1.55;
    background: #2b2b2b;
    padding: 12px;
    border-radius: 8px;
}

.control-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
}

.control-group {
    background: #2a2a2a;
    padding: 13px;
    border-radius: 9px;
    display: flex;
    flex-direction: column;
    gap: 9px;
}

.control-group label {
    font-size: 13px;
    color: #ccc;
    display: flex;
    justify-content: space-between;
    gap: 10px;
}

.control-group label span {
    color: #4da3ff;
    font-weight: 800;
}

input[type="range"] {
    width: 100%;
}

input[type="color"] {
    width: 100%;
    height: 38px;
    border: none;
    background: transparent;
    cursor: pointer;
}

.utility-btn {
    background: #333;
    border: 1px solid #444;
    color: #fff;
    padding: 11px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 800;
}

.utility-btn:hover {
    background: #444;
}

.hidden {
    display: none !important;
}

@media (max-width: 768px) {
    body {
        flex-direction: column;
    }

    #control-panel {
        width: 100%;
        max-width: none;
        min-width: 0;
        height: 50vh;
        border-left: none;
        border-top: 1px solid #333;
    }

    #control-panel.collapsed {
        height: 0;
        width: 100%;
        padding: 0;
    }

    .control-grid {
        grid-template-columns: 1fr;
    }

    h3 {
        margin-top: 8px;
    }
}
</style>
</head>

<body>

<div id="canvas-container">
    <button id="floating-toggle">설정창 접기 ◀</button>
    <canvas id="simCanvas"></canvas>
</div>

<div id="control-panel">
    <h3>액체 시뮬레이션 설정</h3>

    <div class="tabs">
        <button class="tab-btn active" data-mode="1">옵션 1</button>
        <button class="tab-btn" data-mode="2">옵션 2</button>
        <button class="tab-btn" data-mode="3">옵션 3</button>
    </div>

    <p class="info-text" id="mode-desc">
        옵션 1: 점성 있는 액체 입자가 서로 끌어당기며 자연스럽게 퍼집니다.
    </p>

    <button class="utility-btn" id="resetBtn">🔄 리셋</button>

    <div class="control-grid">
        <div class="control-group">
            <label>액체 색상</label>
            <input type="color" id="fluidColor" value="#ffffff">
        </div>

        <div class="control-group">
            <label>배경 색상</label>
            <input type="color" id="bgColor" value="#222222">
        </div>
    </div>

    <div id="controls-mode1" class="mode-controls control-grid">
        <div class="control-group">
            <label>퍼짐 속도 <span id="v-m1-speed">5</span></label>
            <input type="range" id="m1-speed" min="1" max="12" value="5">
        </div>

        <div class="control-group">
            <label>점성 / 뭉침 <span id="v-m1-viscosity">7</span></label>
            <input type="range" id="m1-viscosity" min="1" max="12" value="7">
        </div>

        <div class="control-group">
            <label>물방울 개수 <span id="v-m1-count">36</span></label>
            <input type="range" id="m1-count" min="6" max="90" value="36">
        </div>

        <div class="control-group">
            <label>물방울 크기 <span id="v-m1-size">34</span></label>
            <input type="range" id="m1-size" min="8" max="80" value="34">
        </div>

        <div class="control-group">
            <label>표면 장력 <span id="v-m1-tension">6</span></label>
            <input type="range" id="m1-tension" min="1" max="12" value="6">
        </div>

        <div class="control-group">
            <label>흔들림 / 유기성 <span id="v-m1-wobble">5</span></label>
            <input type="range" id="m1-wobble" min="0" max="12" value="5">
        </div>

        <div class="control-group">
            <label>잔상 유지 시간 <span id="v-m1-life">7</span></label>
            <input type="range" id="m1-life" min="1" max="12" value="7">
        </div>

        <div class="control-group">
            <label>중력감 <span id="v-m1-gravity">1</span></label>
            <input type="range" id="m1-gravity" min="0" max="8" value="1">
        </div>
    </div>

    <div id="controls-mode2" class="mode-controls control-grid hidden">
        <div class="control-group">
            <label>파문 확산 속도 <span id="v-m2-spread">5</span></label>
            <input type="range" id="m2-spread" min="1" max="12" value="5">
        </div>

        <div class="control-group">
            <label>충격 크기 <span id="v-m2-force">48</span></label>
            <input type="range" id="m2-force" min="20" max="120" value="48">
        </div>

        <div class="control-group">
            <label>블러 강도 <span id="v-m2-blur">5</span></label>
            <input type="range" id="m2-blur" min="0" max="18" value="5">
        </div>

        <div class="control-group">
            <label>사라지는 속도 <span id="v-m2-fade">5</span></label>
            <input type="range" id="m2-fade" min="1" max="12" value="5">
        </div>

        <div class="control-group">
            <label>중앙 농도 <span id="v-m2-density">7</span></label>
            <input type="range" id="m2-density" min="1" max="12" value="7">
        </div>

        <div class="control-group">
            <label>외곽 부드러움 <span id="v-m2-softness">8</span></label>
            <input type="range" id="m2-softness" min="1" max="12" value="8">
        </div>

        <div class="control-group">
            <label>파문 두께 <span id="v-m2-thickness">6</span></label>
            <input type="range" id="m2-thickness" min="1" max="12" value="6">
        </div>
    </div>

    <div id="controls-mode3" class="mode-controls control-grid hidden">
        <div class="control-group">
            <label>흡수 속도 <span id="v-m3-speed">3</span></label>
            <input type="range" id="m3-speed" min="1" max="8" value="3">
        </div>
